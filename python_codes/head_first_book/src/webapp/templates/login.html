{% extends 'base.html' %}

{% block body %}

<h2>{{ the_title }}</h2>

<form method="POST" action="/login">
  <table>
    <p>Use this form to login :</p>
    <tr><td>User:</td><td><input name="user" type="TEXT" width="60"></td></tr>
    <tr><td>Password:</td><td><input name="password" type="TEXT" width="60"></td></tr>
  </table>
  <p>When you're ready, click this button:</p>
  <p><input value="Do login !" type="SUBMIT"></p>
</form>

{% endblock %}
